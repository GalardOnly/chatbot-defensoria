<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dicas de Casa Fortaleza</title>
<style>
  :root {
    --app-height: 100dvh;
    --bg: #07111f;
    --panel: #0d1b2d;
    --panel-strong: #12243c;
    --border: rgba(142, 168, 209, 0.18);
    --text: #f4f7fb;
    --muted: #95a4bf;
    --assistant: #13263e;
    --user: #244f8f;
    --danger: #b93b49;
    --danger-strong: #d64f5d;
    --shadow: 0 18px 38px rgba(0, 0, 0, 0.22);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: Arial, sans-serif;
  }

  body {
    overflow: hidden;
    overscroll-behavior: none;
  }

  button,
  input {
    font: inherit;
  }

  #app {
    height: var(--app-height);
    display: flex;
    flex-direction: column;
    background:
      radial-gradient(circle at top, rgba(42, 84, 144, 0.2), transparent 34%),
      linear-gradient(180deg, #091221 0%, #07111f 100%);
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    padding: calc(12px + env(safe-area-inset-top)) 14px 12px;
    background: rgba(7, 17, 31, 0.92);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 20;
  }

  .brand {
    min-width: 0;
  }

  .brand h1 {
    font-size: 1rem;
    line-height: 1.25;
    margin-bottom: 4px;
  }

  .brand span {
    display: block;
    color: var(--muted);
    font-size: 0.78rem;
    line-height: 1.35;
  }

  #header-btns {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  .top-btn {
    border: 1px solid var(--border);
    background: rgba(19, 38, 62, 0.88);
    color: var(--text);
    min-width: 48px;
    min-height: 44px;
    padding: 0 12px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 0.84rem;
    font-weight: bold;
    touch-action: manipulation;
  }

  .top-btn.danger {
    background: rgba(185, 59, 73, 0.2);
    border-color: rgba(214, 79, 93, 0.4);
  }

  #chat-container {
    width: min(760px, 100%);
    margin: 0 auto;
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    height: 100%;
  }

  #mensagens {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding: 18px 14px 28px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }

  .bolha-wrap {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .bolha-wrap.usuario {
    align-items: flex-end;
  }

  .bolha-wrap.assistente {
    align-items: flex-start;
  }

  .bolha {
    max-width: min(84%, 620px);
    padding: 14px 16px;
    border-radius: 18px;
    font-size: 1rem;
    line-height: 1.5;
    word-break: break-word;
    white-space: pre-wrap;
    box-shadow: var(--shadow);
  }

  .bolha.usuario {
    background: var(--user);
    color: #fff;
    border-bottom-right-radius: 6px;
  }

  .bolha.assistente {
    background: var(--assistant);
    color: var(--text);
    border: 1px solid var(--border);
    border-bottom-left-radius: 6px;
  }

  .horario {
    color: var(--muted);
    font-size: 0.75rem;
    padding: 0 6px;
  }

  .digitando {
    display: flex;
    gap: 6px;
    padding: 12px 14px;
    background: var(--assistant);
    border: 1px solid var(--border);
    border-radius: 18px;
    border-bottom-left-radius: 6px;
    box-shadow: var(--shadow);
  }

  .digitando span {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #b5c2d8;
    animation: bounce 1.2s infinite;
  }

  .digitando span:nth-child(2) {
    animation-delay: 0.2s;
  }

  .digitando span:nth-child(3) {
    animation-delay: 0.4s;
  }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  #input-area {
    display: flex;
    gap: 10px;
    padding: 12px 14px calc(12px + env(safe-area-inset-bottom));
    background: rgba(7, 17, 31, 0.96);
    border-top: 1px solid var(--border);
    backdrop-filter: blur(12px);
    position: sticky;
    bottom: 0;
    z-index: 15;
    flex-shrink: 0;
  }

  #input-msg {
    flex: 1;
    min-width: 0;
    min-height: 48px;
    padding: 0 16px;
    border: 1px solid var(--border);
    border-radius: 16px;
    background: var(--panel);
    color: var(--text);
    outline: none;
  }

  #input-msg::placeholder {
    color: #7f91ae;
  }

  #btn-enviar {
    width: 52px;
    height: 48px;
    border: none;
    border-radius: 16px;
    background: var(--user);
    color: #fff;
    cursor: pointer;
    font-size: 1rem;
    font-weight: bold;
    flex-shrink: 0;
    touch-action: manipulation;
  }

  #modal-consentimento {
    display: none;
    position: fixed;
    inset: 0;
    padding: 20px;
    background: rgba(1, 7, 14, 0.76);
    z-index: 30;
    justify-content: center;
    align-items: center;
  }

  #modal-consentimento.visivel {
    display: flex;
  }

  #modal-box {
    width: min(420px, 100%);
    background: var(--panel-strong);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 22px;
    box-shadow: var(--shadow);
  }

  #modal-box h3 {
    font-size: 1rem;
    margin-bottom: 10px;
  }

  #modal-box p {
    color: var(--muted);
    line-height: 1.55;
    font-size: 0.9rem;
    margin-bottom: 14px;
  }

  #modal-box input {
    width: 100%;
    min-height: 46px;
    padding: 0 14px;
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 12px;
    display: none;
  }

  #modal-box input.visivel {
    display: block;
  }

  .modal-btns {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .btn-aceitar,
  .btn-anonima {
    min-height: 46px;
    padding: 0 12px;
    border-radius: 12px;
    cursor: pointer;
    border: 1px solid var(--border);
  }

  .btn-aceitar {
    background: var(--user);
    color: #fff;
    border: none;
  }

  .btn-anonima {
    background: transparent;
    color: var(--muted);
  }

  @media (max-width: 640px) {
    header {
      padding-left: 12px;
      padding-right: 12px;
    }

    .brand h1 {
      font-size: 0.96rem;
    }

    .brand span {
      font-size: 0.74rem;
    }

    #header-btns {
      gap: 6px;
    }

    .top-btn {
      min-width: 44px;
      padding: 0 10px;
      font-size: 0.78rem;
    }

    #mensagens {
      padding-left: 12px;
      padding-right: 12px;
    }

    .bolha {
      max-width: 89%;
      font-size: 0.98rem;
      padding: 13px 14px;
    }

    #input-area {
      padding-left: 12px;
      padding-right: 12px;
    }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand">
      <h1>Dicas de Casa Fortaleza</h1>
      <span>Conversa discreta e orientacao segura</span>
    </div>
    <div id="header-btns">
      <button class="top-btn danger" type="button" onclick="apagarConversa()">Apagar</button>
      <button class="top-btn danger" type="button" onclick="saidaRapida()">Sair</button>
    </div>
  </header>

  <div id="chat-container">
    <div id="mensagens"></div>
    <div id="input-area">
      <input
        id="input-msg"
        type="text"
        placeholder="Digite sua mensagem..."
        autocomplete="off"
        autocorrect="off"
        autocapitalize="sentences"
        spellcheck="false"
        enterkeyhint="send"
        onkeypress="if(event.key==='Enter') enviar()">
      <button id="btn-enviar" type="button" onclick="enviar()">Enviar</button>
    </div>
  </div>

  <div id="modal-consentimento">
    <div id="modal-box">
      <h3>Seus dados estao protegidos</h3>
      <p>Para acompanharmos seu caso e garantir ajuda continua, podemos registrar seu nome. Seus dados sao sigilosos e podem ser apagados a qualquer momento.</p>
      <input id="input-nome" type="text" placeholder="Digite seu nome (opcional)" autocomplete="off" autocorrect="off" spellcheck="false">
      <div class="modal-btns">
        <button class="btn-aceitar" id="btn-aceitar-consentimento" type="button" onclick="mostrarCampoNome()">Aceito e quero me identificar</button>
        <button class="btn-aceitar" id="btn-confirmar-nome" type="button" style="display:none" onclick="confirmarNome()">Confirmar</button>
        <button class="btn-anonima" type="button" onclick="fecharModal()">Prefiro continuar anonima</button>
      </div>
    </div>
  </div>
</div>

<script>
  const API_BASE = window.location.origin;
  const SESSION_ID_RE = /^sess_[a-f0-9]{64}$/;
  const SESSION_DELETE_TOKEN_RE = /^[a-f0-9]{64}$/;
  let sessionId = sessionStorage.getItem('chat_session_id') || '';
  let deleteToken = sessionStorage.getItem('chat_delete_token') || '';
  let modoAtual = 'fachada';
  let consentimentoMostrado = false;

  async function criarSessaoServidor() {
    const response = await fetch(`${API_BASE}/conversa/sessao`, { method: 'POST' });
    if (!response.ok) {
      throw new Error(await lerErroResposta(response, 'Nao foi possivel iniciar a sessao agora.'));
    }

    const data = await response.json();
    if (!SESSION_ID_RE.test(data.session_id || '') || !SESSION_DELETE_TOKEN_RE.test(data.delete_token || '')) {
      throw new Error('Sessao invalida retornada pelo servidor.');
    }

    sessionId = data.session_id;
    deleteToken = data.delete_token;
    sessionStorage.setItem('chat_session_id', sessionId);
    sessionStorage.setItem('chat_delete_token', deleteToken);
  }

  async function garantirSessao() {
    if (SESSION_ID_RE.test(sessionId) && SESSION_DELETE_TOKEN_RE.test(deleteToken)) {
      return;
    }
    await criarSessaoServidor();
  }

  async function lerErroResposta(response, erroPadrao) {
    try {
      const data = await response.json();
      return data.erro || data.detalhe || erroPadrao;
    } catch (e) {
      return erroPadrao;
    }
  }

  function atualizarAlturaViewport() {
    const viewport = window.visualViewport;
    const altura = viewport ? viewport.height : window.innerHeight;
    document.documentElement.style.setProperty('--app-height', `${altura}px`);
  }

  function horaAtual() {
    return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  }

  function rolarParaFim() {
    const mensagens = document.getElementById('mensagens');
    mensagens.scrollTop = mensagens.scrollHeight;
  }

  function criarMensagemInicial() {
    document.getElementById('mensagens').innerHTML = '';
    adicionarBolha('Ola! Bem-vinda ao Dicas de Casa Fortaleza. Como posso te ajudar hoje?', 'assistente');
  }

  function saidaRapida() {
    window.location.replace('https://g1.globo.com');
  }

  function adicionarBolha(texto, tipo) {
    const wrap = document.createElement('div');
    wrap.className = 'bolha-wrap ' + tipo;

    const bolha = document.createElement('div');
    bolha.className = 'bolha ' + tipo;
    bolha.textContent = texto;

    const hora = document.createElement('span');
    hora.className = 'horario';
    hora.textContent = horaAtual();

    wrap.appendChild(bolha);
    wrap.appendChild(hora);
    document.getElementById('mensagens').appendChild(wrap);
    rolarParaFim();
    return bolha;
  }

  function mostrarDigitando() {
    const wrap = document.createElement('div');
    wrap.className = 'bolha-wrap assistente';
    wrap.id = 'digitando-wrap';
    wrap.innerHTML = '<div class="digitando"><span></span><span></span><span></span></div>';
    document.getElementById('mensagens').appendChild(wrap);
    rolarParaFim();
  }

  function removerDigitando() {
    const el = document.getElementById('digitando-wrap');
    if (el) el.remove();
  }

  function mostrarCampoNome() {
    document.getElementById('input-nome').classList.add('visivel');
    document.getElementById('btn-aceitar-consentimento').style.display = 'none';
    document.getElementById('btn-confirmar-nome').style.display = 'block';
    document.getElementById('input-nome').focus();
  }

  async function confirmarNome() {
    const nome = document.getElementById('input-nome').value.trim();
    if (!nome) return;

    try {
      await garantirSessao();
      const response = await fetch(`${API_BASE}/conversa/identificar`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId, nome })
      });
      if (!response.ok) {
        throw new Error(await lerErroResposta(response, 'Não foi possível registrar seu nome agora.'));
      }

      fecharModal();
      adicionarBolha('Obrigada, ' + nome + '. Estou aqui para te ajudar.', 'assistente');
    } catch (e) {
      fecharModal();
      adicionarBolha(e.message || 'Não foi possível registrar seu nome agora. Você pode continuar sem se identificar.', 'assistente');
    }
  }

  function fecharModal() {
    document.getElementById('modal-consentimento').classList.remove('visivel');
  }

  async function apagarConversa() {
    removerDigitando();

    try {
      await garantirSessao();
      const response = await fetch(`${API_BASE}/conversa/${sessionId}`, {
        method: 'DELETE',
        headers: { 'X-Session-Token': deleteToken }
      });
      if (!response.ok) {
        throw new Error(await lerErroResposta(response, 'Não foi possível apagar a conversa agora.'));
      }

      await criarSessaoServidor();
      modoAtual = 'fachada';
      consentimentoMostrado = false;
      document.getElementById('input-msg').value = '';
      document.getElementById('input-nome').value = '';
      document.getElementById('input-nome').classList.remove('visivel');
      document.getElementById('btn-aceitar-consentimento').style.display = 'block';
      document.getElementById('btn-confirmar-nome').style.display = 'none';
      fecharModal();
      criarMensagemInicial();
    } catch (e) {
      adicionarBolha(e.message || 'Não foi possível apagar a conversa agora. Tente novamente em instantes.', 'assistente');
    }
  }

  async function enviar() {
    const input = document.getElementById('input-msg');
    const mensagem = input.value.trim();
    if (!mensagem) return;

    try {
      await garantirSessao();
      input.value = '';
      adicionarBolha(mensagem, 'usuario');
      mostrarDigitando();

      const response = await fetch(`${API_BASE}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mensagem, session_id: sessionId })
      });

      if (!response.ok) throw new Error('Falha na resposta do servidor');
      const data = await response.json();

      removerDigitando();
      adicionarBolha(data.resposta || 'Servico temporariamente indisponivel. Tente novamente.', 'assistente');

      if (data.modo === 'real' && modoAtual === 'fachada' && !consentimentoMostrado) {
        modoAtual = 'real';
        consentimentoMostrado = true;
        setTimeout(() => {
          document.getElementById('modal-consentimento').classList.add('visivel');
        }, 500);
      }

      if (data.modo === 'real') modoAtual = 'real';
    } catch (e) {
      removerDigitando();
      adicionarBolha('Erro ao conectar. Tente novamente.', 'assistente');
    }
  }

  atualizarAlturaViewport();
  window.addEventListener('resize', atualizarAlturaViewport);
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', atualizarAlturaViewport);
    window.visualViewport.addEventListener('scroll', atualizarAlturaViewport);
  }
  document.getElementById('input-msg').addEventListener('focus', () => {
    setTimeout(() => {
      atualizarAlturaViewport();
      rolarParaFim();
    }, 250);
  });

  criarMensagemInicial();
  garantirSessao().catch(() => {});
</script>
</body>
</html>
